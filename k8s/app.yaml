apiVersion: apps/v1
kind: Deployment
metadata:
  name: crystal-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crystal-app
  template:
    metadata:
      labels:
        app: crystal-app
    spec:
      containers:
      - name: crystal-app
        image: nginx:alpine
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: crystal-app
  namespace: default
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-name: "crystal-app-nlb"
spec:
  type: LoadBalancer
  selector:
    app: crystal-app
  ports:
  - port: 80
    targetPort: 80