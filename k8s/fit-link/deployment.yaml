apiVersion: v1
kind: ServiceAccount
metadata:
  name: fit-link
  namespace: fit-link
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fit-link
  namespace: fit-link
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fit-link
  template:
    metadata:
      labels:
        app: fit-link
    spec:
      serviceAccountName: fit-link
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: fit-link
        image: 463470958137.dkr.ecr.us-east-1.amazonaws.com/fit-link:2d6d65e8e765c26afa6f6b1f783af1c7edfa3190
        ports:
        - containerPort: 8080
        env:
        # Values populated from AWS Secrets Manager via fit-link-secrets K8s Secret
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: fit-link-secrets
              key: DATABASE_URL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: fit-link-secrets
              key: SECRET_KEY
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: fit-link
  namespace: fit-link
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-name: "fit-link-nlb"
spec:
  type: LoadBalancer
  selector:
    app: fit-link
  ports:
  - port: 80
    targetPort: 8080