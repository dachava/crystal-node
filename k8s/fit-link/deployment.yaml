apiVersion: apps/v1
kind: Deployment
metadata:
  name: fit-link
  namespace: fit-link
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fit-link
  template:
    metadata:
      labels:
        app: fit-link
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: fit-link
        image: 463470958137.dkr.ecr.us-east-1.amazonaws.com/fit-link:latest
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: fit-link
  namespace: fit-link
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-name: "fit-link-nlb"
spec:
  type: LoadBalancer
  selector:
    app: fit-link
  ports:
  - port: 80
    targetPort: 8080