apiVersion: apps/v1
kind: Deployment
metadata:
  name: crystal-app
  namespace: crystal-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crystal-app
  template:
    metadata:
      labels:
        app: crystal-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: crystal-app
        image: 463470958137.dkr.ecr.us-east-1.amazonaws.com/crystal-app:ff30b46a7d1c59c930658f7e1b48cc9c4f54ab44
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: crystal-app
  namespace: crystal-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-name: "crystal-app-nlb"
spec:
  type: LoadBalancer
  selector:
    app: crystal-app
  ports:
  - port: 80
    targetPort: 8080